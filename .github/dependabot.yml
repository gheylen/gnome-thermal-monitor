version: 2
updates:
  # Dev dependencies (ESLint and friends).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    groups:
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"

  # GitHub Actions — keeps the SHA-pinned actions current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
