name: Release

on:
  push:
    tags: ['v[0-9]*']

permissions:
  contents: write

jobs:
  release:
    name: Build & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install glib tools
        run: sudo apt-get install -y --no-install-recommends libglib2.0-bin

      - run: npm ci
      - run: npm run lint
      - run: glib-compile-schemas --strict schemas/
      - run: make pack

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.shell-extension.zip
