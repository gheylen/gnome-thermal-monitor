name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  schema:
    name: Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install glib tools
        run: sudo apt-get install -y --no-install-recommends libglib2.0-bin
      - name: Validate GSettings schema
        run: glib-compile-schemas --strict schemas/

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          log-opts: --all
